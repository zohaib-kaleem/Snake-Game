<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<main>

<section id="game">
<div id="instruction">Snake - move with Arrow keys or WASD</div>
<canvas id="snake-apple-game" width="600" height="600"></canvas>
</section>

<aside>

<div id="score-bar">
<span>Score</span>
<div id="score">0</div>
</div>

<div id="controls">
<button id="pause">Start</button>
<button id="restart">Restart</button>
</div>

<div id="hint">
Classic Snake: eat apples to grow. Don't hit the walls or yourself.
</div>

</aside>

</main>

<script src="script.js"></script>

</body>
</html>
